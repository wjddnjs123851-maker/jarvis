<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS 가계부 비서</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #0a0c10; color: #e8eaf0; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; min-height: 100vh; padding-bottom: 60px; }

    .header { background: #0d1117; border-bottom: 1px solid #1e2330; padding: 22px 24px 18px; }
    .header-inner { max-width: 520px; margin: 0 auto; display: flex; justify-content: space-between; align-items: flex-end; }
    .header-sub { font-size: 10px; letter-spacing: 4px; color: #4dabf7; margin-bottom: 5px; font-weight: 600; }
    .header-title { font-size: 20px; font-weight: 800; }
    .header-date { font-size: 12px; color: #3d4558; text-align: right; }

    .inner { max-width: 520px; margin: 0 auto; padding: 20px; }

    .tabs { display: flex; background: #13161e; border-radius: 12px; padding: 4px; margin-bottom: 22px; border: 1px solid #1e2330; }
    .tab-btn { flex: 1; padding: 10px 0; border-radius: 9px; border: none; background: transparent; color: #3d4558; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: inherit; }
    .tab-btn.active { background: #1c2333; color: #4dabf7; box-shadow: 0 1px 8px rgba(0,0,0,0.4); }

    textarea { width: 100%; background: #13161e; border: 1px solid #1e2330; border-radius: 14px; padding: 16px 18px; color: #e8eaf0; font-size: 15px; line-height: 1.75; resize: none; outline: none; font-family: inherit; transition: border-color 0.2s; }
    textarea:focus { border-color: #2d4a6e; }

    .btn-primary { width: 100%; margin-top: 10px; padding: 14px 0; border-radius: 12px; border: none; background: linear-gradient(135deg, #1971c2, #1864ab); color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; font-family: inherit; transition: opacity 0.2s; }
    .btn-primary:disabled { background: #13161e; color: #2d3348; cursor: not-allowed; }
    .btn-primary:not(:disabled):hover { opacity: 0.9; }

    .btn-success { flex: 1; padding: 12px 0; border-radius: 10px; border: none; background: linear-gradient(135deg, #2f9e44, #2b8a3e); color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; font-family: inherit; }
    .btn-cancel { padding: 12px 16px; border-radius: 10px; background: #1a1e2a; border: 1px solid #2d3348; color: #666; font-size: 13px; cursor: pointer; font-family: inherit; }

    .parsed-card { margin-top: 16px; background: #13161e; border: 1px solid #253046; border-radius: 16px; padding: 20px 22px; animation: fadeIn 0.2s ease; }
    .parsed-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .parsed-type-icon { font-size: 20px; }
    .parsed-type-label { color: #4dabf7; font-weight: 700; font-size: 13px; }
    .parsed-hint { margin-left: auto; font-size: 11px; color: #3d4558; }
    .parsed-row { display: flex; gap: 12px; align-items: baseline; margin-bottom: 8px; }
    .parsed-key { color: #3d4558; font-size: 11px; min-width: 72px; text-align: right; }
    .parsed-val { color: #c8cfe0; font-size: 14px; }
    .parsed-val.amount { color: #ffd166; font-size: 20px; font-weight: 800; }
    .parsed-actions { display: flex; gap: 8px; margin-top: 16px; }

    .field-group { margin-bottom: 14px; }
    .field-label { font-size: 11px; color: #3d4558; margin-bottom: 6px; letter-spacing: 1px; }
    input[type=text], input[type=number], input[type=date], select {
      width: 100%; background: #13161e; border: 1px solid #1e2330; border-radius: 10px;
      padding: 12px 14px; color: #e8eaf0; font-size: 14px; outline: none; font-family: inherit;
    }
    select option { background: #13161e; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

    .msg { margin-top: 14px; padding: 13px 18px; border-radius: 12px; font-weight: 600; text-align: center; font-size: 14px; }
    .msg.success { background: rgba(47,158,68,0.12); border: 1px solid rgba(47,158,68,0.3); color: #69db7c; }
    .msg.error { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.25); color: #ff8787; }

    .history-section { margin-top: 32px; }
    .history-label { font-size: 10px; color: #2d3348; letter-spacing: 3px; margin-bottom: 14px; font-weight: 600; }
    .history-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid #13161e; }
    .history-name { font-size: 14px; color: #c8cfe0; }
    .history-amount { font-size: 15px; font-weight: 700; color: #ffd166; text-align: right; }
    .history-time { font-size: 11px; color: #2d3348; margin-top: 2px; text-align: right; }

    .hidden { display: none !important; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div class="header-sub">JARVIS PRIME</div>
      <div class="header-title">가계부 비서 💬</div>
    </div>
    <div class="header-date" id="headerDate"></div>
  </div>
</div>

<div class="inner">
  <!-- 탭 -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('auto')">🤖 자연어</button>
    <button class="tab-btn" onclick="switchTab('manual')">✏️ 직접입력</button>
  </div>

  <!-- 자연어 탭 -->
  <div id="tab-auto">
    <textarea id="nlInput" rows="5"
      placeholder="개떡같이 말해도 돼요 😄&#10;&#10;예) 편의점 삼각김밥 1500 하나카드&#10;예) 버스 1500&#10;예) 타이레놀 2알 먹었어&#10;예) 오이 3개 샀어">
    </textarea>
    <button class="btn-primary" id="parseBtn" onclick="handleParse()">파싱하기 →</button>

    <!-- 파싱 결과 카드 -->
    <div class="parsed-card hidden" id="parsedCard">
      <div class="parsed-header">
        <span class="parsed-type-icon" id="parsedIcon"></span>
        <span class="parsed-type-label" id="parsedLabel"></span>
        <span class="parsed-hint">맞으면 기록 눌러요</span>
      </div>
      <div id="parsedRows"></div>
      <div class="parsed-actions">
        <button class="btn-success" id="confirmBtn" onclick="handleConfirm()">✅ 시트에 기록</button>
        <button class="btn-cancel" onclick="resetCard()">다시</button>
      </div>
    </div>
  </div>

  <!-- 직접입력 탭 -->
  <div id="tab-manual" class="hidden">
    <div class="field-group">
      <div class="field-label">날짜</div>
      <input type="date" id="m_date">
    </div>
    <div class="field-group">
      <div class="field-label">내용</div>
      <input type="text" id="m_content" placeholder="편의점 삼각김밥">
    </div>
    <div class="field-group">
      <div class="field-label">금액 (원)</div>
      <input type="number" id="m_amount" placeholder="1500">
    </div>
    <div class="field-group">
      <div class="field-label">구분</div>
      <select id="m_category">
        <option>지출</option><option>수입</option>
      </select>
    </div>
    <div class="field-group">
      <div class="field-label">대분류</div>
      <select id="m_subcategory">
        <option>식비</option><option>주거</option><option>교통</option><option>구독</option>
        <option>생활용품</option><option>건강</option><option>보험</option><option>통신</option>
        <option>문화</option><option>금융</option><option>급여</option><option>기타</option>
      </select>
    </div>
    <div class="field-group">
      <div class="field-label">결제수단</div>
      <select id="m_method">
        <option>하나카드</option><option>우리카드</option><option>현대카드</option>
        <option>국민카드</option><option>계좌이체</option><option>현금</option>
      </select>
    </div>
    <button class="btn-primary" style="margin-top:4px" onclick="handleManual()">시트에 기록 →</button>
  </div>

  <!-- 상태 메시지 -->
  <div id="statusMsg" class="hidden"></div>

  <!-- 최근 기록 -->
  <div class="history-section hidden" id="historySection">
    <div class="history-label">최근 기록</div>
    <div id="historyList"></div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx40fZ_z2Xv2dlQpoGgJaCbdpSSQrPeW5m7-lGxULWV8yDH3nffbnyvlOYK0w2NpErh/exec";
const CLAUDE_API = "https://api.anthropic.com/v1/messages";

const TYPE_META = {
  log: { icon: "💳", label: "가계부" },
  inventory_add: { icon: "🛒", label: "식재료 추가" },
  inventory_use: { icon: "🍳", label: "식재료 소비" },
  pharmacy_use: { icon: "💊", label: "약품 복용" },
  health_log: { icon: "🥗", label: "식단 기록" },
};

let currentParsed = null;
let history = [];

// 날짜 초기화
const kst = new Date(Date.now() + 9*3600000);
const todayStr = kst.toISOString().slice(0,10);
document.getElementById("m_date").value = todayStr;
document.getElementById("headerDate").textContent =
  kst.toLocaleDateString("ko-KR", { month:"long", day:"numeric", weekday:"short" });

// 탭 전환
function switchTab(tab) {
  document.getElementById("tab-auto").classList.toggle("hidden", tab !== "auto");
  document.getElementById("tab-manual").classList.toggle("hidden", tab !== "manual");
  document.querySelectorAll(".tab-btn").forEach((btn, i) => {
    btn.classList.toggle("active", (i === 0 && tab === "auto") || (i === 1 && tab === "manual"));
  });
  hideMsg(); resetCard();
}

// 엔터키로 파싱
document.getElementById("nlInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleParse(); }
});

// 파싱
async function handleParse() {
  const text = document.getElementById("nlInput").value.trim();
  if (!text) return;
  const btn = document.getElementById("parseBtn");
  btn.disabled = true;
  btn.textContent = "🤖 읽는 중...";
  resetCard(); hideMsg();

  try {
    const result = await parseWithClaude(text);
    currentParsed = result;
    showParsedCard(result);
  } catch(e) {
    showMsg("❌ 파싱 오류가 났어요. 다시 시도해주세요.", "error");
  }

  btn.disabled = false;
  btn.textContent = "파싱하기 →";
}

// Claude API 호출
async function parseWithClaude(text) {
  const res = await fetch(CLAUDE_API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": "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",
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 300,
      system: `가계부 입력 파서. 자연어를 JSON으로 변환. 오늘: ${todayStr}
type: "log"(지출/수입), "inventory_add"(식재료추가), "inventory_use"(식재료소비), "pharmacy_use"(약복용), "health_log"(식단기록)
log면: date, category(지출/수입), subcategory(식비/주거/교통/구독/생활용품/건강/보험/통신/문화/금융/급여/기타), content, amount(숫자만), method(하나카드/우리카드/현대카드/국민카드/계좌이체/현금, 언급없으면 하나카드)
inventory_add면: name, amount(용량/개수), expiry(yyyy-MM-dd), count(개수없으면 "-")
health_log면: date, name(음식명), amount(섭취량), calories(kcal), carbs(g), protein(g), fat(g), sodium(mg), cholesterol(mg), sat_fat(g), fiber(g), sugar(g) - 모르는 영양소는 ""
신선식품 보관기간(구매일 기준 expiry 자동계산):
- 뿌리채소(무/당근/감자/고구마): 냉장 21일
- 잎채소(대파/상추/시금치/깻잎): 냉장 7일
- 과일(사과/배): 냉장 30일, 바나나/딸기: 7일
- 두부: 개봉전 14일, 계란: 30일
- 육류(소고기/돼지고기/닭고기): 냉장 3일
- 생선/해산물: 냉장 2일
- 유통기한 표시 없는 신선식품은 위 기준 적용
여러 품목이면 배열로: [{"type":"inventory_add",...}, {"type":"inventory_add",...}]
JSON만 반환. 마크다운 금지.`,
      messages: [{ role: "user", content: text }],
    }),
  });
  const data = await res.json();
  const raw = (data.content?.[0]?.text || "{}").replace(/```json|```/g, "").trim();
  const parsed = JSON.parse(raw);
  // 배열이면 첫 번째 항목 기준으로 카드 표시, 전체는 _batch로 저장
  if (Array.isArray(parsed)) {
    parsed[0]._batch = parsed;
    return parsed[0];
  }
  return parsed;
}

// 파싱 결과 카드 표시
function showParsedCard(parsed) {
  const meta = TYPE_META[parsed.type] || { icon: "📝", label: parsed.type };
  document.getElementById("parsedIcon").textContent = meta.icon;
  document.getElementById("parsedLabel").textContent = meta.label;

  const rows = Object.entries(parsed).filter(([k]) => k !== "type" && k !== "_batch").map(([k, v]) => {
    const isAmount = k === "amount";
    return `<div class="parsed-row">
      <span class="parsed-key">${k}</span>
      <span class="parsed-val ${isAmount ? "amount" : ""}">
        ${isAmount ? Number(v).toLocaleString() + "원" : v}
      </span>
    </div>`;
  }).join("");

  document.getElementById("parsedRows").innerHTML = rows;
  document.getElementById("parsedCard").classList.remove("hidden");
}

// 시트에 기록
async function handleConfirm() {
  if (!currentParsed) return;
  const btn = document.getElementById("confirmBtn");
  btn.disabled = true;
  btn.textContent = "전송 중...";

  try {
    const batch = currentParsed._batch || [currentParsed];
    for (const item of batch) {
      const { _batch, ...payload } = item;
      await sendToSheet(payload);
    }
    const text = document.getElementById("nlInput").value.trim();
    addHistory(TYPE_META[currentParsed.type]?.icon + " " + (currentParsed.content || currentParsed.name || text), currentParsed.amount);
    document.getElementById("nlInput").value = "";
    resetCard();
    showMsg("✅ Google Sheets에 기록됐어요!", "success");
    setTimeout(hideMsg, 3000);
  } catch(e) {
    showMsg("❌ 전송 오류가 났어요. Apps Script 상태를 확인해주세요.", "error");
  }

  btn.disabled = false;
  btn.textContent = "✅ 시트에 기록";
}

// 직접 입력 전송
async function handleManual() {
  const content = document.getElementById("m_content").value.trim();
  const amount = document.getElementById("m_amount").value.trim();
  if (!content || !amount) { showMsg("내용과 금액을 입력해주세요.", "error"); return; }

  const payload = {
    type: "log",
    date: document.getElementById("m_date").value,
    category: document.getElementById("m_category").value,
    subcategory: document.getElementById("m_subcategory").value,
    content,
    amount: Number(amount),
    method: document.getElementById("m_method").value,
  };

  try {
    await sendToSheet(payload);
    addHistory("💳 " + content, Number(amount));
    document.getElementById("m_content").value = "";
    document.getElementById("m_amount").value = "";
    showMsg("✅ Google Sheets에 기록됐어요!", "success");
    setTimeout(hideMsg, 3000);
  } catch(e) {
    showMsg("❌ 전송 오류가 났어요.", "error");
  }
}

// Apps Script GET 방식 전송
async function sendToSheet(payload) {
  const url = `${API_URL}?payload=${encodeURIComponent(JSON.stringify(payload))}`;
  const data = await (await fetch(url)).json();
  if (data.status !== "ok") throw new Error(data.message || "unknown error");
}

// 최근 기록 추가
function addHistory(label, amount) {
  const time = new Date().toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
  history.unshift({ label, amount, time });
  if (history.length > 8) history.pop();
  renderHistory();
}

function renderHistory() {
  if (history.length === 0) return;
  document.getElementById("historySection").classList.remove("hidden");
  document.getElementById("historyList").innerHTML = history.map(h => `
    <div class="history-item">
      <div class="history-name">${h.label}</div>
      <div>
        ${h.amount ? `<div class="history-amount">${Number(h.amount).toLocaleString()}원</div>` : ""}
        <div class="history-time">${h.time}</div>
      </div>
    </div>
  `).join("");
}

function resetCard() {
  currentParsed = null;
  document.getElementById("parsedCard").classList.add("hidden");
}

function showMsg(text, type) {
  const el = document.getElementById("statusMsg");
  el.textContent = text;
  el.className = `msg ${type}`;
  el.classList.remove("hidden");
}

function hideMsg() {
  document.getElementById("statusMsg").classList.add("hidden");
}
</script>
</body>
</html>
